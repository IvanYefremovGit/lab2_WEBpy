{% extends "base.html" %}
{% block content %}

<div class="container" style="max-width:700px">

<h2 class="mb-3">AI помічник</h2>

<div class="card card-soft p-3 mb-3">

<div id="chat-box" style="height:400px; overflow-y:auto">

</div>

</div>

<div class="input-group">

<input id="message" class="form-control" placeholder="Напишіть питання...">

<button class="btn btn-primary" onclick="sendMessage()">Надіслати</button>

</div>

</div>

<script>

async function sendMessage() {

    const input = document.getElementById("message")
    const chat = document.getElementById("chat-box")

    const text = input.value

    if (!text) return

    chat.innerHTML += `<div><b>Ви:</b> ${text}</div>`

    input.value = ""

    const response = await fetch("/ai/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({message: text})
    })

    const data = await response.json()

    chat.innerHTML += `<div class="text-primary"><b>AI:</b> ${data.answer}</div>`

    chat.scrollTop = chat.scrollHeight
}

</script>

{% endblock %}
